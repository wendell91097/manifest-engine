<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifest Engine — World Bible</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>

:root {
  --bg:       #0e0d0c;
  --bg2:      #141210;
  --bg3:      #1d1a16;
  --text:     #e0d9ce;
  --text2:    #9b9084;
  --text3:    #5a554e;
  --accent:   #c9963a;
  --accent2:  #7a5c1e;
  --border:   #282420;
  --border2:  #1c1a17;
  --sb-w:     232px;
  --body:     'Crimson Pro', Georgia, serif;
  --mono:     'IBM Plex Mono', 'Courier New', monospace;
  --color-background-secondary: #1d1a16;
  --color-text-primary:   #e0d9ce;
  --color-text-secondary: #9b9084;
  --color-border-tertiary:#282420;
  --color-border-secondary:#38332b;
  --font-sans: 'IBM Plex Mono', monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  font-size:18.5px;
  line-height:1.78;
  min-height:100vh;
}

/* ── LAYOUT ── */

#shell{display:flex;min-height:100vh}

#sidebar{
  width:var(--sb-w);
  flex-shrink:0;
  position:fixed;
  top:0;left:0;
  height:100vh;
  overflow-y:auto;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:100;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}

#main{margin-left:var(--sb-w);flex:1;min-width:0;padding-bottom:120px}

/* ── PROGRESS ── */

#prog{
  position:fixed;top:0;
  left:var(--sb-w);right:0;
  height:2px;background:transparent;z-index:200;
}
#prog-bar{height:100%;background:var(--accent);width:0;transition:width .08s linear}

/* ── SIDEBAR ── */

.sb-logo{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border2);
}
.sb-logo strong{
  display:block;
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  color:var(--accent);
  letter-spacing:.06em;
  margin-bottom:3px;
}
.sb-logo span{
  font-family:var(--mono);
  font-size:9.5px;
  color:var(--text3);
  letter-spacing:.06em;
  line-height:1.5;
  display:block;
}

#nav{list-style:none;padding:10px 0;flex:1}

#nav li a{
  display:block;
  padding:4px 18px;
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--text3);
  text-decoration:none;
  line-height:1.45;
  border-left:2px solid transparent;
  transition:color .12s,border-color .12s;
}
#nav li a:hover{color:var(--text)}
#nav li.h2 a{
  font-size:10px;
  font-weight:600;
  color:var(--text2);
  letter-spacing:.03em;
  padding-top:9px;
}
#nav li.h3 a{padding-left:30px;font-size:9.5px}
#nav li a.on{color:var(--accent);border-left-color:var(--accent)}

.sb-foot{
  padding:14px 18px;
  border-top:1px solid var(--border2);
  font-family:var(--mono);
  font-size:9.5px;
  color:var(--text3);
  line-height:1.7;
}

/* ── HEADER ── */

#hdr{
  padding:52px 64px 44px;
  border-bottom:1px solid var(--border);
}
.hdr-eye{
  font-family:var(--mono);
  font-size:9.5px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:14px;
}
.hdr-eye::after{
  content:'';display:block;
  height:1px;width:48px;
  background:var(--accent2);
}
#hdr h1{
  font-family:var(--mono);
  font-size:26px;
  font-weight:600;
  letter-spacing:-.01em;
  line-height:1.15;
  color:var(--text);
  margin:0 0 18px;
}
.hdr-meta{
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--text3);
  letter-spacing:.04em;
  display:flex;
  gap:0;
  flex-wrap:wrap;
}
.hdr-meta span{
  display:flex;align-items:center;
  padding-right:16px;margin-right:16px;
  border-right:1px solid var(--border);
}
.hdr-meta span:last-child{border:none}

/* ── CONTENT ── */

#content{
  max-width:760px;
  padding:0 64px;
  margin:0 auto;
}

/* heading anchors */
#content h1,#content h2,#content h3,#content h4{scroll-margin-top:32px}

#content h1{
  font-family:var(--mono);
  font-size:20px;
  font-weight:600;
  color:var(--text);
  margin:64px 0 10px;
  letter-spacing:-.01em;
}

#content h2{
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  color:var(--accent);
  margin:0 0 20px;
  padding-top:52px;
  letter-spacing:.1em;
  text-transform:uppercase;
  border-top:1px solid var(--border);
  padding-bottom:0;
}

/* inject section numbers via data-num */
#content h2[data-num]::before{
  content:attr(data-num) ' · ';
  color:var(--text3);
  font-size:9px;
  letter-spacing:.12em;
}

#content h3{
  font-family:var(--mono);
  font-size:10px;
  font-weight:600;
  color:var(--text2);
  letter-spacing:.14em;
  text-transform:uppercase;
  margin:32px 0 12px;
}

#content h4{
  font-family:var(--body);
  font-size:20px;
  font-weight:600;
  font-style:italic;
  color:var(--text);
  margin:24px 0 8px;
}

#content p{margin:0 0 18px;color:var(--text)}
#content p:last-child{margin-bottom:0}

#content ul,#content ol{
  margin:0 0 18px;
  padding-left:0;
  list-style:none;
}
#content li{
  position:relative;
  padding-left:18px;
  margin-bottom:9px;
  color:var(--text);
}
#content ul>li::before{
  content:'·';
  position:absolute;left:4px;
  color:var(--accent);font-weight:700;
}
#content ol{counter-reset:oc}
#content ol>li::before{
  content:counter(oc) '.';
  counter-increment:oc;
  position:absolute;left:0;
  font-family:var(--mono);font-size:10px;
  color:var(--text3);top:5px;
}
#content li>p{margin:0}

#content strong{font-weight:600;color:var(--text)}
#content em{font-style:italic;color:var(--text2)}

#content a{
  color:var(--accent);text-decoration:none;
  border-bottom:1px solid var(--accent2);
  transition:border-color .15s;
}
#content a:hover{border-color:var(--accent)}

#content code{
  font-family:var(--mono);font-size:11.5px;
  background:var(--bg3);
  border:1px solid var(--border);
  padding:1px 5px;border-radius:3px;
  color:var(--text2);
}

#content pre{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:18px 22px;
  overflow-x:auto;
  margin:0 0 22px;
}
#content pre code{
  background:none;border:none;padding:0;
  font-size:11.5px;line-height:1.7;color:var(--text2);
}

#content hr{
  border:none;border-top:1px solid var(--border);margin:36px 0;
}

#content blockquote{
  border-left:2px solid var(--accent2);
  padding:0 0 0 22px;
  margin:22px 0;
  font-style:italic;color:var(--text2);
}

/* ── TABLES ── */

.table-wrap{overflow-x:auto;margin:20px 0 24px;border:1px solid var(--border);border-radius:4px}

#content table{
  width:100%;border-collapse:collapse;
  font-family:var(--mono);font-size:11.5px;
  min-width:500px;
}
#content th{
  font-weight:600;color:var(--text2);
  letter-spacing:.09em;text-transform:uppercase;
  font-size:9.5px;
  padding:9px 12px;
  border-bottom:1px solid var(--border);
  text-align:left;
  background:var(--bg2);
}
#content td{
  padding:9px 12px;
  border-bottom:1px solid var(--border2);
  color:var(--text);font-size:11.5px;
  line-height:1.55;vertical-align:top;
}
#content tr:last-child td{border-bottom:none}
#content tbody tr:hover td{background:rgba(255,255,255,.02)}

/* ── ARCHITECTURE SECTION ── */

#arch{
  padding-top:52px;
  border-top:1px solid var(--border);
  margin-bottom:4px;
}

.arch-label{
  font-family:var(--mono);
  font-size:11px;font-weight:600;
  color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:6px;
}
.arch-label::before{
  content:'3.5 · ';
  color:var(--text3);font-size:9px;letter-spacing:.12em;
}
.arch-sub{
  font-family:var(--mono);
  font-size:10px;color:var(--text3);
  letter-spacing:.05em;margin-bottom:22px;
}
.arch-intro{
  font-family:var(--body);
  font-size:17.5px;line-height:1.72;
  color:var(--text2);margin-bottom:28px;
}
.arch-wrap{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:5px;padding:22px;
}

/* ── LOADING ── */

#loading{
  padding:80px 64px;
  font-family:var(--mono);font-size:12px;
  color:var(--text3);letter-spacing:.08em;
}
.dot{display:inline-block;animation:blink 1.3s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* ── MOBILE TOGGLE ── */

#tog{
  display:none;
  position:fixed;top:12px;left:12px;z-index:300;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:7px 10px;
  cursor:pointer;
  font-family:var(--mono);font-size:11px;
  color:var(--text2);gap:7px;align-items:center;
}

/* ── RESPONSIVE ── */

@media(max-width:860px){
  #sidebar{transform:translateX(-100%);transition:transform .2s ease}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #tog{display:flex}
  #prog{left:0}
  #content{padding:0 24px}
  #hdr{padding:56px 24px 36px}
  #content h2{font-size:10.5px}
}

/* ── DIAGRAM styles (scoped via :root vars already set) ── */

.bf{font-size:12px;padding:4px 12px;border-radius:20px;border:.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;font-family:var(--mono)}
.bf.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
#det{min-height:80px;padding:12px 16px;margin-top:10px;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:6px;font-size:12.5px;line-height:1.6;font-family:var(--mono)}
.bdt{font-weight:500;color:var(--color-text-primary);display:block;margin-bottom:5px}
.bdg{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:10px;margin-right:5px;border:.5px solid;vertical-align:middle;font-weight:500}
.bdg-gen{border-color:#7F77DD;color:#7F77DD}
.bdg-react{border-color:#1D9E75;color:#1D9E75}
.bdg-fb{border-color:#BA7517;color:#BA7517}
.bdg-time{border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.conn-g{cursor:pointer;transition:opacity .2s}
.node rect{stroke-width:.5}
.c-gray rect{fill:var(--color-background-secondary);stroke:var(--color-border-secondary)}
.c-coral rect{fill:#2a1414;stroke:#c06060}
.c-amber rect{fill:#231a09;stroke:#c9963a}
.c-purple rect{fill:#1a1428;stroke:#7F77DD}
.c-teal rect{fill:#0e2020;stroke:#1D9E75}
.c-blue rect{fill:#0e1828;stroke:#5b9dd9}
.th{font-size:13px;font-weight:500;fill:var(--color-text-primary);font-family:var(--mono)}
.ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--mono)}

</style>
</head>
<body>

<button id="tog" aria-label="Toggle navigation" onclick="toggleSidebar()">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="1" y1="3" x2="13" y2="3"/><line x1="1" y1="7" x2="13" y2="7"/><line x1="1" y1="11" x2="13" y2="11"/>
  </svg>
  NAV
</button>

<div id="prog"><div id="prog-bar"></div></div>

<div id="shell">

<!-- SIDEBAR -->

    <span>World Bible · v16</span>

      <span>Year 37 A.D.</span>

  <div id="main-content">

    <div id="content" style="display:none"></div>
  </div>

</main>
</div>

<!-- ── ARCHITECTURE DIAGRAM ── -->
<template id="arch-tpl">
<div id="arch">
  <div class="arch-label">Character Architecture</div>
  <div class="arch-sub">Five-layer causal model · Substrate → Drives → Axioms → Beliefs → Passions</div>
  <p class="arch-intro">Every Star in the engine runs on the same five-layer architecture. The layers move at different speeds — substrate is universal and biological, drives are shaped over a formation window of years, axioms shift only under catastrophic pressure, beliefs update across seasons, and passions crystallize at the threshold where beliefs accumulate enough confirming weight to become future-directed action. The diagram below traces the causal chains between layers and the feedback paths that make the system self-modifying. Click any node or arrow to trace how it works.</p>
  <div class="arch-wrap">

    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      <button class="bf on" onclick="filt('all',this)">All</button>
      <button class="bf" onclick="filt('gen',this)">Generative chain</button>
      <button class="bf" onclick="filt('react',this)">World interaction</button>
      <button class="bf" onclick="filt('fb',this)">Feedback loops</button>
    </div>

    <svg width="100%" viewBox="0 0 640 588" style="display:block">
    <defs>
      <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

      </marker>
    </defs>
    <g class="node c-gray" id="l-phys" onclick="sel('phys')" style="cursor:pointer">
      <rect x="20" y="70" width="130" height="50" rx="6"/>
      <text class="th" x="85" y="91" text-anchor="middle" dominant-baseline="central">Physical env</text>
      <text class="ts" x="85" y="107" text-anchor="middle" dominant-baseline="central">direct activation</text>
    </g>
    <g class="node c-gray" id="l-fac" onclick="sel('fac')" style="cursor:pointer">
      <rect x="20" y="148" width="130" height="50" rx="6"/>
      <text class="th" x="85" y="169" text-anchor="middle" dominant-baseline="central">Faction gravity</text>
      <text class="ts" x="85" y="185" text-anchor="middle" dominant-baseline="central">formation window</text>
    </g>
    <g class="node c-gray" id="l-info" onclick="sel('info')" style="cursor:pointer">
      <rect x="20" y="296" width="130" height="58" rx="6"/>
      <text class="th" x="85" y="315" text-anchor="middle" dominant-baseline="central">Information</text>
      <text class="ts" x="85" y="331" text-anchor="middle" dominant-baseline="central">events · other Stars</text>
      <text class="ts" x="85" y="346" text-anchor="middle" dominant-baseline="central">2 filters apply</text>
    </g>
    <g class="node c-coral" id="l-sub" onclick="sel('sub')" style="cursor:pointer">
      <rect x="165" y="70" width="300" height="50" rx="6"/>
      <text class="th" x="315" y="91" text-anchor="middle" dominant-baseline="central">Layer 0 — Substrate</text>
      <text class="ts" x="315" y="107" text-anchor="middle" dominant-baseline="central">nine universal emotional systems</text>
    </g>
    <g class="node c-amber" id="l-drv" onclick="sel('drv')" style="cursor:pointer">
      <rect x="165" y="148" width="300" height="50" rx="6"/>
      <text class="th" x="315" y="169" text-anchor="middle" dominant-baseline="central">Layer 1 — Drives</text>
      <text class="ts" x="315" y="185" text-anchor="middle" dominant-baseline="central">substrate systems aimed by formation</text>
    </g>
    <g class="node c-purple" id="l-axm" onclick="sel('axm')" style="cursor:pointer">
      <rect x="165" y="226" width="300" height="50" rx="6"/>
      <text class="th" x="315" y="247" text-anchor="middle" dominant-baseline="central">Layer 2 — Axioms</text>
      <text class="ts" x="315" y="263" text-anchor="middle" dominant-baseline="central">what reality obviously is</text>
    </g>
    <g class="node c-teal" id="l-bel" onclick="sel('bel')" style="cursor:pointer">
      <rect x="165" y="304" width="300" height="50" rx="6"/>
      <text class="th" x="315" y="325" text-anchor="middle" dominant-baseline="central">Layer 3 — Beliefs</text>
      <text class="ts" x="315" y="341" text-anchor="middle" dominant-baseline="central">held · unsure · denied propositions</text>
    </g>
    <g class="node c-blue" id="l-pas" onclick="sel('pas')" style="cursor:pointer">
      <rect x="165" y="382" width="300" height="50" rx="6"/>
      <text class="th" x="315" y="403" text-anchor="middle" dominant-baseline="central">Layer 4 — Passions</text>
      <text class="ts" x="315" y="419" text-anchor="middle" dominant-baseline="central">beliefs crossing threshold</text>
    </g>
    <g class="node c-gray" id="l-beh" onclick="sel('beh')" style="cursor:pointer">

    </g>

    <g class="conn-g" data-conn="gen" onclick="sel('sd')">

    </g>
    <g class="conn-g" data-conn="gen" onclick="sel('ab')">
      <line x1="315" y1="276" x2="315" y2="304" stroke="#7F77DD" stroke-width="2.5" marker-end="url(#ah)"/>
      <text x="326" y="292" font-size="10" fill="#7F77DD" dominant-baseline="middle" font-family="var(--mono)">years</text>
    </g>
    <g class="conn-g" data-conn="gen" onclick="sel('fd')">
      <line x1="150" y1="173" x2="165" y2="173" stroke="#7F77DD" stroke-width="2.5" marker-end="url(#ah)"/>
    </g>
    <!-- Reactive arrows -->
    <g class="conn-g" data-conn="react" onclick="sel('ps')">
      <line x1="150" y1="95" x2="165" y2="95" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#ah)"/>
    </g>
    <g class="conn-g" data-conn="react" onclick="sel('ib')">
      <line x1="150" y1="325" x2="165" y2="329" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#ah)"/>
    </g>
    <g class="conn-g" data-conn="react" onclick="sel('bp')">
      <line x1="315" y1="354" x2="315" y2="382" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#ah)"/>
      <text x="326" y="370" font-size="10" fill="#1D9E75" dominant-baseline="middle" font-family="var(--mono)">months</text>
    </g>
    <g class="conn-g" data-conn="react" onclick="sel('pb')">
      <line x1="465" y1="407" x2="480" y2="407" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#ah)"/>
    </g>
    <g class="conn-g" data-conn="react" onclick="sel('bw')">
      <line x1="550" y1="432" x2="550" y2="460" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#ah)"/>

    <!-- Feedback arrows -->

    <g class="conn-g" data-conn="fb" onclick="sel('wsfac')">
      <path d="M550,504 L550,548 L6,548 L6,173 L20,173" fill="none" stroke="#BA7517" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ah)"/>

<script>
/* ── DIAGRAM DATA ── */
const D={
  phys:{t:'Physical environment',type:'react',ts:'Immediate',b:'Physical conditions activate substrate systems before any belief processing occurs. Light regulates S9 Meaning and neurochemistry. Cold suppresses S2 Threat\'s comfort mode — the Witness\'s bare feet are deliberate epistemology, keeping overlay offline. The acute phase (Years 0–5) ran S2 Threat at maximum in every survivor, a biological mark that persists at Year 37. The Luminaries\' light hierarchy is a direct intervention here: differential exposure reorganizes members\' neurochemistry and hormonal profiles according to position in the hierarchy.'},
  fac:{t:'Faction gravity — formation window',type:'gen',ts:'Decadal — the primary shaping mechanism',b:'During the formation window, faction environment shapes which substrate systems get rewarded, suppressed, and provided targets — driving them to develop orientation and strength. The faction does not persuade the child. It entrains them. The ideology does not need to be argued; it is absorbed as the structure of the environment. Leaving a faction\'s beliefs is possible. Leaving its fundamental orientation requires something closer to a second birth. The first generation at Year 37 (age 22) had drives shaped during stabilization — without the founders\' crisis formation. Categorically different people.'},
  info:{t:'Information, events, other Stars',type:'react',ts:'Weeks to months — filtered before landing',b:'All information passes through two sequential filters. Filter 1 — Source Trust: the same information from a trusted vs distrusted source hits the belief system differently; trust is relationship-specific, not faction-wide. Filter 2 — Belief System Configuration: a coherent belief architecture actively resists destabilization; a Star in active denial is specifically vulnerable to the suppressed claim surfacing from unexpected directions.'},
  beh:{t:'Behavior — actions in world',type:'react',ts:'Immediate',b:'Dominant passions translate into action. The player can only observe behavior — belief states must be inferred from it, and behavior is always a partial and potentially misleading signal. Behavior is also where the player\'s primary causal power lies: every action modifies the information environment of every Star with observational or transmitted access to what happened. The player\'s death is a political event. A Star\'s defection is not a scripted beat — it is the output of the belief/passion architecture encountering conditions the player helped create.'},
  wst:{t:'World state',type:'fb',ts:'Ongoing — continuous self-modification',b:'The accumulated result of all behaviors from all Stars and world events. World state feeds back into the architecture through three distinct paths. Information: changed world state generates new events and testimony that re-enter the belief system through the two filters. Physical environment: world state changes reshape the conditions that activate substrate systems directly, before any belief processing (the fire, the grid, the water). Faction gravity: sustained world state changes expand or contract faction institutional reach, reshaping the formation environment for every child being born into that reality.'},
  sub:{t:'Layer 0 — Substrate',type:null,ts:'Universal · intensity profile varies between characters',b:'Nine universal emotional systems present in every human at birth: Attachment (S1), Threat (S2), Seeking (S3), Play (S4), Reward (S5), Status (S6), Care (S7), Lust (S8), Meaning (S9). Emotions are these systems becoming conscious. The substrate cannot be removed — only suppressed, redirected, hijacked, or starved. What varies is the relative intensity of each system. The Shepherd\'s S2 Threat runs at 94/100 and reads as rationalism. The Witness\'s S6 Status has dissolved to near-zero.'},
  drv:{t:'Layer 1 — Drives',type:null,ts:'Formation window · adult drift possible over decades',b:'Drives are what substrate systems become when they acquire orientation through early experience and faction gravity. D1 Control, D2 Belonging, D3 Autonomy, D4 Mastery, D5 Meaning Seeking, D6 Security, D7 Novelty, D8 Power, D9 Care, D10 Transcendence. The same substrate system aimed differently produces categorically different people: S2 Threat aimed at information → D1 Control Orientation (the Shepherd). S2 Threat aimed at stable conditions → D6 Security (most independent settlers).'},
  axm:{t:'Layer 2 — Axioms',type:null,ts:'Civilizational · move only under catastrophic pressure',b:'Foundational beliefs about the nature of reality across five domains: Ontology, Epistemology, Ethics, Human Nature, Teleology. A character experiences axioms not as propositions to evaluate but as the way things obviously are. Axioms often rationalize drives — the drive came first, the axiom makes it feel like discovered truth. The Destruction produced axiom-level shifts in everyone who survived it. The Shepherd holds onto.deterministic at 97 confidence while carving himself out as the one free rational agent — an incoherence that lives below his ability to examine it.'},
  bel:{t:'Layer 3 — Beliefs',type:null,ts:'Seasons to years · updated through two filters',b:'Specific propositions held, denied, or left unresolved across thousands of claims. Beliefs are hidden from the player — only inferable from behavior. Denial has a cost: active suppression of a claim generates behavioral rigidity and uncharacteristic reactivity to specific topics. The submerged passion (previously active, pushed below surface by a belief shift) is the most dramatic phenomenon at this layer — it waits, and re-emerges carrying the weight of everything that happened while it was down.'},
  pas:{t:'Layer 4 — Passions',type:null,ts:'Days to months · crystallized from threshold-crossing beliefs',b:'Beliefs that accumulate sufficient weight and confirming evidence cross an activation threshold and become future-directed drives. Passions require temporal orientation: they point toward or away from a future state. The Witness\'s null passion field is not emptiness — his S9 Meaning runs at near-maximum, but temporal orientation has been dissolved, so beliefs cross threshold without converting. The passion system (−100 to +100, Devoted → Irreconcilable) is the surface the player interacts with.'},
  sd:{t:'Substrate → Drives',type:'gen',ts:'Decadal · formation window',b:'The relative intensity of each substrate system shapes which drives develop orientation during the formation window. The loudest systems in a character\'s profile get aimed first by the formative environment. S2 Threat dominant + faction gravity that structures information-seeking as threat management = D1 Control Orientation (the Shepherd). S1 Attachment dominant + faction gravity that rewards collective bonds = D2 Belonging Primary.'},
  da:{t:'Drives → Axioms',type:'gen',ts:'Generational · rationalization is slow',b:'Drives generate axiom positions that justify and sustain them. The drive came first; the axiom makes it feel like discovered truth. D1 Control Orientation arrives at onto.deterministic because a deterministic universe can be predicted and managed. D4 Mastery arrives at eth.duty_primary because a universal standard is necessary for mastery to be real. Varek did not reason his way to the code. He arrived at the code and the axioms are what make it feel like it was always there.'},
  ab:{t:'Axioms → Beliefs',type:'gen',ts:'Years · axioms constrain belief availability',b:'Axiom positions determine which beliefs are coherently available, which are incoherent, and which require active suppression cost. onto.deterministic forecloses self.culpability_personal at zero cost — the ground dissolves. Holding incompatible axioms requires suppression at the deepest level of the architecture. The Shepherd\'s incoherence lives at the axiom level, below his ability to examine it — which is why Victor approaching it from the empirical direction is structurally the most threatening thing that can happen to him.'},
  bp:{t:'Beliefs → Passions',type:'react',ts:'Months · threshold crossing',b:'Beliefs accumulating sufficient weight and confirming evidence across multiple information cycles cross an activation threshold and crystallize into future-directed drives. A belief at low confidence stays in the belief layer. Accumulated over months from high-trust sources through multiple information cycles, the same claim generates a passion. The Witness\'s null passion field is architecturally coherent: beliefs cross threshold but cannot convert because temporal orientation has been dissolved.'},
  ps:{t:'Physical environment → Substrate activation',type:'react',ts:'Immediate',b:'Physical conditions directly activate substrate systems before any belief processing. Light levels regulate S9 Meaning and suppress S2 Threat. Cold activates S2 Threat\'s discomfort signal. The Witness\'s bare feet are deliberate — cold feet keep the threat system\'s comfort mode offline, preventing the warmth-produced overlay that occludes the raw condition. The Luminaries\' differential light access is a direct biological intervention: who gets the light is who gets the biochemistry.'},
  fd:{t:'Faction gravity → Drive formation',type:'gen',ts:'Formation window · the primary shaping mechanism',b:'The most powerful causal pathway in the architecture. A faction\'s gravity acts on the drives layer during the formation window by structuring which substrate activations are rewarded, suppressed, and provided targets. The Green Hands cultivate S2 Threat\'s disgust mode through theology — the fire feels right before it is reasoned. The Watch remaps S6 Status onto the code\'s hierarchy. The founding generation built their factions with the S4 Play system largely offline and then institutionalized the solution.'},
  ib:{t:'Information/Events → Beliefs (two filters)',type:'react',ts:'Weeks to months · filtered before landing',b:'All information passes through two sequential filters before landing in the belief layer. Filter 1 — Source Trust: the same information from a trusted vs distrusted source hits the system differently; trust is relationship-specific, not faction-wide. Filter 2 — Belief System Configuration: a coherent architecture actively resists destabilization; a Star in active denial is specifically vulnerable to the suppressed claim surfacing from unexpected directions.'},
  pb:{t:'Passions → Behavior',type:'react',ts:'Immediate · expression',b:'Dominant passions translate into action. Passions drive behavior whether the player is engaged or not — the world is alive independent of player attention. A Star with a submerged passion carries it waiting; when the conditions that originally surfaced it return, the passion re-emerges carrying the weight of everything that happened while it was down. The passion system threshold states (Devoted → Steadfast → Trusted → Favorable → Neutral → Strained → Opposed → Hostile → Irreconcilable) represent current orientation, not fixed traits.'},
  bw:{t:'Behavior → World State',type:'react',ts:'Immediate · manifestation',b:'Actions change the world state. The world state at Year 37 is the starting graph — the player\'s campaign is a traversal of that graph that permanently alters its topology. Changed world state feeds back into all three input channels: information (what Stars learn), physical environment (what their substrate systems feel), and faction gravity (what formation environment the next generation is born into). Behavior is where the internal architecture becomes externally legible and where the system becomes self-modifying.'},
  pfb:{t:'Passions → Beliefs (reinforcement)',type:'fb',ts:'Days to weeks · amplification',b:'Active passions reinforce the beliefs that generated them and suppress competing beliefs. A Star whose dominant passion is The Code attends to, seeks, and weights more heavily information that confirms the code\'s validity — and filters out information that challenges it. This is confirmation bias as a structural feature of the architecture, not a failure mode. The loop can be stabilizing or can drive a Star toward positions progressively more extreme and disconnected from new information.'},
  bdf:{t:'Beliefs → Drives (slow drift)',type:'fb',ts:'Years · sustained belief patterns gradually reorient drives',b:'Sustained belief shifts accumulated over years of consistent information can produce drive drift — a gradual reorientation of where substrate systems point their energy. Drive drift in an adult is slower and less complete than formation-window shaping, and often produces internal friction: the old drive orientation does not disappear, it competes with the new one. Drive drift is the mechanism of genuine adult development and the mechanism the Pax Mullebris emissary program exploits.'},
  wsph:{t:'World State → Physical Environment',type:'fb',ts:'Seasons to years · environmental transformation',b:'Changed world state directly reshapes the physical conditions that activate substrate systems. The Green Hands\' fire advancing two miles per year elevates S2 Threat activation in every settlement near the perimeter — not through information, but through the physical presence of smoke, heat, and moving ruin. The Luminaries losing grid infrastructure collapses the biological hierarchy it sustained. These feedback paths bypass belief processing entirely: the substrate responds to the changed world before any Star has formed a belief about what it means.'},
  wsfac:{t:'World State → Faction Gravity',type:'fb',ts:'Years · institutional restructuring',b:'Faction gravity is not a static input — it is a function of world state, which means the formation environment for every child being born is itself a product of prior behavior. The Watch losing personnel contracts reduces its gravitational pull on surrounding settlements. The Algorithm\'s information monopoly weakening means the filter system it has managed for 37 years loses authority. Faction gravity is the most slow-moving feedback path in the architecture, but it operates on the deepest layer: it shapes drives, not just beliefs.'},
  wsif:{t:'World State → Information (primary feedback loop)',type:'fb',ts:'Ongoing · continuous self-modification',b:'Changed world state generates new information that re-enters the belief system through the information filter pathway. This is the primary causal loop: Passions → Behavior → World State → Information → Beliefs → Passions. Every action the player takes modifies the information environment of every Star with access. The Shepherd has been managing this loop for 37 years. The moment another entity has comparable information access, the outputs become one voice among several.'}
};
const TL={gen:'Generative',react:'World interaction',fb:'Feedback'};
const TC={gen:'bdg-gen',react:'bdg-react',fb:'bdg-fb'};
function sel(id){
  const d=D[id];if(!d)return;
  const tb=d.type?`<span class="bdg ${TC[d.type]}">${TL[d.type]}</span>`:'';
  document.getElementById('det').innerHTML=`<span class="bdt">${tb}<span class="bdg bdg-time">${d.ts}</span>${d.t}</span><span style="color:var(--color-text-secondary);font-size:12px">${d.b}</span>`;
}
function filt(type,btn){
  document.querySelectorAll('.bf').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.querySelectorAll('[data-conn]').forEach(el=>{
    el.style.opacity=(type==='all'||el.dataset.conn===type)?1:0.07;
  });
}

/* ── SIDEBAR TOGGLE ── */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

/* ── SCROLL PROGRESS ── */
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const pct=h.scrollTop/(h.scrollHeight-h.clientHeight)*100;
  document.getElementById('prog-bar').style.width=pct+'%';
},{ passive:true });

/* ── MARKDOWN RENDER ── */
(async()=>{
  // Slug helper
  function slug(text){
    return text.toLowerCase()
      .replace(/[^\w\s-]/g,'')
      .replace(/\s+/g,'-')
      .replace(/-+/g,'-')
      .trim();
  }

  // Custom renderer
  const renderer = new marked.Renderer();
  const headings = [];
  let h2count = 0;

  renderer.heading = function(text, level){
    const id = slug(text);
    const num = text.match(/^(\d+\.\d*)/)?.[1] || '';
    const label = text.replace(/^\d+[\.\d]*\s*/,'');
    if(level === 2){
      h2count++;
      headings.push({level:2, id, text:label||text, num});
      return `<h2 id="${id}" data-num="${num}" scroll-target="true">${label||text}</h2>`;
    }
    if(level === 3){
      headings.push({level:3, id, text:label||text});
      return `<h3 id="${id}">${label||text}</h3>`;
    }
    return `<h${level} id="${id}">${text}</h${level}>`;
  };

  // Wrap tables
  renderer.table = function(header,body){
    return `<div class="table-wrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
  };

  marked.use({ renderer, breaks: false, gfm: true });

  let md;
  try {
    const res = await fetch('./manifest_v16.md');
    if(!res.ok) throw new Error('fetch failed');
    md = await res.text();
  } catch(e){
    document.getElementById('loading').innerHTML =
      '<span style="color:#c06060">Could not load manifest_v16.md — make sure it\'s in the same directory as index.html.</span>';
    return;
  }

  // Render markdown
  const html = marked.parse(md);

  // Mount content
  const content = document.getElementById('content');
  document.getElementById('loading').style.display = 'none';
  content.style.display = 'block';
  content.innerHTML = html;

  // Inject architecture section before section 4
  const h2s = content.querySelectorAll('h2');
  let target = null;
  h2s.forEach(el => {
    if(!target && el.textContent.match(/^(The )?Factions/i)) target = el;
  });
  if(!target) {
    // fallback: find h2 with data-num starting with 4
    h2s.forEach(el => {
      if(!target && el.getAttribute('data-num')==='4.') target = el;
    });
  }
  if(!target && h2s.length > 3) target = h2s[3];

  if(target){
    const tpl = document.getElementById('arch-tpl');
    const archNode = tpl.content.cloneNode(true);
    content.insertBefore(archNode, target);
  }

  // Build nav
  // Re-scan headings from DOM (includes injected arch section)
  const navList = document.getElementById('nav');
  navList.innerHTML = '';

  // Add arch to headings list at position after section 3
  const archEntry = {level:2, id:'arch', text:'Character Architecture', num:'3.5'};

  // Gather all h2/h3 from rendered content
  const allHeadings = [];
  content.querySelectorAll('h2,h3').forEach(el=>{
    allHeadings.push({
      level: parseInt(el.tagName[1]),
      id: el.id || 'arch',
      text: el.id === 'arch' ? 'Character Architecture' :
            el.textContent.replace(/^\d+[\.\d]*\s*/,'').trim() || el.textContent.trim()
    });
  });

  // Also push the arch node if present
  const archEl = document.getElementById('arch');
  if(archEl && !archEl.id){ archEl.id = 'arch'; }

  allHeadings.forEach(h=>{
    const li = document.createElement('li');
    li.className = h.level === 2 ? 'h2' : 'h3';
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.text;
    a.addEventListener('click', e=>{
      if(window.innerWidth<=860){
        document.getElementById('sidebar').classList.remove('open');
      }
    });
    li.appendChild(a);
    navList.appendChild(li);
  });

  // Scroll spy
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id = entry.target.id;
        document.querySelectorAll('#nav a').forEach(a=>{
          a.classList.toggle('on', a.getAttribute('href')==='#'+id);
        });
      }
    });
  },{rootMargin:'-10% 0px -80% 0px'});

  content.querySelectorAll('h2,h3').forEach(el=>observer.observe(el));
  const archSection = document.getElementById('arch');
  if(archSection) observer.observe(archSection);

})();
</script>
</body>
</html>
